<div class="relative flex items-center justify-center min-h-screen bg-white p-4">
  <!-- Loading Overlay -->
  @if (showOverlay()) {
    <div
      class="fixed inset-0 flex items-center justify-center z-50 transition-opacity duration-300"
      [class.opacity-100]="loading()"
      [class.opacity-0]="!loading()"
      style="background-color: rgba(255,255,255,0.8)"
    >
      <svg width="60px" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg" class="stroke-primary">
        <g fill="none" fill-rule="evenodd">
          <g transform="translate(1 1)" stroke-width="2">
            <circle stroke-opacity=".5" cx="18" cy="18" r="18" />
            <path d="M36 18c0-9.94-8.06-18-18-18">
              <animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="1s" repeatCount="indefinite" />
            </path>
          </g>
        </g>
      </svg>
    </div>
  }

  <div class="w-full max-w-md">
    <div style="box-shadow: 0 0 30px #00000017" class="bg-white p-8 rounded-lg lg:p-12">
      <div class="flex flex-col items-center mb-8">
        <img
          src="https://kllix.com.br/images/kllix.svg"
          alt="Kllix Cilia Logo"
          class="w-[200px] mb-4"
        >
        <span class="text-xl font-bold bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent tracking-tight">Cilia</span>
      </div>

      @if (successMessage()) {
        <div class="mb-4 p-3 rounded-lg bg-green-100 text-green-800 text-center font-semibold animate-fade-in border border-green-200">
          {{ successMessage() }}
        </div>
      }
      @if (errorMessage()) {
        <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-800 text-center font-semibold animate-fade-in border border-red-200">
          {{ errorMessage() }}
        </div>
      }

      <form class="flex flex-col gap-6" (ngSubmit)="handleSubmit()">
        <div>
          <label for="username" class="ml-2.5 mb-2 block text-md font-medium text-text">Usuário</label>
          <input type="text" id="username" name="username" autocomplete="off" required [(ngModel)]="username"
                  class="w-full px-6 py-4 rounded-lg border border-input-border bg-input-bg focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-gray-900 placeholder-gray-500"
                  placeholder="Insira seu nome de usuário">
        </div>
        <div>
          <label for="password" class="ml-2.5 mb-2 block text-md font-medium text-text">Senha</label>
          <div class="relative">
            <input [type]="showLoginPassword() ? 'text' : 'password'" id="password" name="password" autocomplete="off" required [(ngModel)]="loginPassword"
                    class="w-full px-6 py-4 rounded-lg border border-input-border bg-input-bg focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-gray-900 placeholder-gray-500"
                    placeholder="Insira sua senha">
            <button type="button" (click)="showLoginPassword.set(!showLoginPassword())"
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
              <lucide-icon [name]="showLoginPassword() ? 'eye-off' : 'eye'" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full py-3 rounded-full bg-primary hover:opacity-90 transition-opacity font-medium text-lg shadow-md focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 text-white">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
